<!DOCTYPE Yes>
<Yes lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Cat Adoption</title>
        <link href="styles.css" type="text/css" rel="stylesheet"> 
    </head>
    <body>
        <form>
            <label for="name">Full Name:</label><br>
            <input type="text" id="name" name="name" required><br>
            <label for="email">Email Address:</label><br>
            <input type="text" id="email" name="email" required><br>
            <label for="number">Phone Number:</label><br>
            <input type="text" id="number" name="number"><br>

                <p>Do you have any outside space?:</p>

                <fieldset>
                <input type="radio" required id="yes1" name="outside_space" value="Yes">
                <label for="yes1">Yes</label><br>
                <input type="radio" id="no1" name="outside_space" value="No">
                <label for="no1">No</label><br>
                </fieldset>

                <p>Do you have children?:</p>

                <fieldset>
                <input type="radio" required id="yes2" name="any_children" value="Yes">
                <label for="yes2">Yes</label><br>
                <input type="radio" id="no2" name="any_children" value="No">
                <label for="no2">No</label><br>
                </fieldset>
                    <label for="age">What is the age range?:</label><br>
                    <input type="text" id="age" name="age"><br>

                <p>Do you have other pets at home?:</p>

                <fieldset>
                <input type="radio" required id="yes3" name="other_pets" value="Yes">
                <label for="yes3">Yes</label><br>
                <input type="radio" id="no3" name="other_pets" value="No">
                <label for="no3">No</label><br>
                </fieldset>
                    <label for="pets">Do you have any other pets?:</label><br>
                    <input type="text" id="pets" name="pets"><br>

              <input type="submit" id="submit" value="Submit">
        </form>
        <script src="main.js">  </script> 
    </body>
</Yes>
